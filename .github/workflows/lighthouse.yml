name: Lighthouse CI

on:
  pull_request:
    branches: [main]
    paths:
      - "**.html"
      - "**.css"
      - "**.js"
      - "RG-*/hero.*"
      - ".lighthouserc.yml"

jobs:
  lighthouse:
    name: Lighthouse scores
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install LHCI
        run: npm install -g @lhci/cli

      - name: Run Lighthouse CI
        run: lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

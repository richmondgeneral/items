ci:
  collect:
    # Serve the repo root so /RG-0001/ paths resolve correctly.
    startServerCommand: python3 -m http.server 4173
    startServerReadyPattern: "Serving HTTP"
    startServerReadyTimeout: 10000
    numberOfRuns: 1
    url:
      - http://localhost:4173/          # gallery index
      - http://localhost:4173/RG-0001/  # representative item card

  assert:
    # Conservative thresholds: the site uses external Google Fonts and
    # image-heavy hero assets, so performance headroom is intentionally wide.
    # Tighten these scores after the first green CI run.
    assertions:
      categories:performance:
        - warn
        - minScore: 0.55
          aggregationMethod: median
      categories:accessibility:
        - error
        - minScore: 0.90
          aggregationMethod: median
      categories:best-practices:
        - error
        - minScore: 0.80
          aggregationMethod: median
      categories:seo:
        - error
        - minScore: 0.85
          aggregationMethod: median

  upload:
    target: temporary-public-storage
